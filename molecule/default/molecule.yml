---
dependency:
  name: galaxy
  options:
    role-file: requirements.yml

driver:
  name: docker

platforms:
  - name: instance
    image: geerlingguy/docker-debian12-ansible:latest
    privileged: true
    pre_build_image: true
    cgroupns: host
    cgroupns_mode: host
    command: /lib/systemd/systemd
    tmpfs:
      - /run
      - /run/lock
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    groups:
      - containers

provisioner:
  name: ansible
  options:
    D: true
  inventory:
    group_vars:
      containers:
        netresearch_docker_containers:
          - name: whoami
            image: traefik/whoami
            networks:
              - name: whoami
              - name: traefik
          - name: nginx
            image: nginx
            networks:
              - name: nginx
              - name: traefik
          - name: no_networks
            image: traefik/whoami
            networks: []
          # Tombstone shape: state: absent with the `networks` key omitted
          # entirely. Regression guard for the with_subelements skip_missing
          # fix — an empty list ([]) does not reproduce the failure, a missing
          # key does.
          - name: decommissioned
            image: traefik/whoami
            state: absent

verifier:
  name: ansible

lint: |
  set -e
  yamllint .
  ansible-lint
